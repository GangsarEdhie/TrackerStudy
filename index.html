<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker by Ryan</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Fredoka:wght@500;600&family=Silkscreen&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #fdfcf0; --sidebar: #ffffff; --card: #ffffff; --text: #2d3436;
            --text-dim: #636e72; --border: #e0e0e0; --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --accent: #b19cd9; --accent-glow: rgba(177, 156, 217, 0.3);
            --gradient: linear-gradient(135deg, #b19cd9, #d4c1ec);
            --radius-lg: 25px; --radius-md: 15px;
            --btn-sub-bg: #f1f2f6; --btn-sub-text: #2d3436;
        }

        /* Palettes */
        .color-lavender { --accent: #b19cd9; --accent-glow: rgba(177, 156, 217, 0.3); --gradient: linear-gradient(135deg, #b19cd9, #d4c1ec); }
        .color-mint { --accent: #82d1e0; --accent-glow: rgba(130, 209, 224, 0.3); --gradient: linear-gradient(135deg, #82d1e0, #b2f2f2); }
        .color-rose { --accent: #ff9aa2; --accent-glow: rgba(255, 154, 162, 0.3); --gradient: linear-gradient(135deg, #ff9aa2, #ffb7b2); }
        .color-sky { --accent: #74b9ff; --accent-glow: rgba(116, 185, 255, 0.3); --gradient: linear-gradient(135deg, #74b9ff, #a29bfe); }
        .color-peach { --accent: #ffdac1; --accent-glow: rgba(255, 218, 193, 0.3); --gradient: linear-gradient(135deg, #ffdac1, #ffe4d1); }
        .color-sage { --accent: #b5ebb4; --accent-glow: rgba(181, 235, 180, 0.3); --gradient: linear-gradient(135deg, #b5ebb4, #c9f0c8); }
        .color-lemon { --accent: #fee135; --accent-glow: rgba(254, 225, 53, 0.3); --gradient: linear-gradient(135deg, #fee135, #fffbd6); }
        .color-apricot { --accent: #ffb7b2; --accent-glow: rgba(255, 183, 178, 0.3); --gradient: linear-gradient(135deg, #ffb7b2, #ffd1cf); }
        .color-grape { --accent: #e0bbe4; --accent-glow: rgba(224, 187, 228, 0.3); --gradient: linear-gradient(135deg, #e0bbe4, #f1daef); }

        [data-theme="dark"] {
            --bg: #0a0a0c; --sidebar: #121217; --card: #1a1a20; --text: #f5f6fa;
            --text-dim: #a4b0be; --border: rgba(255,255,255,0.08); --shadow: 0 15px 35px rgba(0,0,0,0.4);
            --btn-sub-bg: rgba(255,255,255,0.05); --btn-sub-text: #f5f6fa;
        }

        [data-style="pixel"] { font-family: 'Silkscreen', cursive !important; }
        [data-style="pixel"] * { border-radius: 0 !important; }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.2s ease; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 10; }
        .nav-item { padding: 16px 20px; border-radius: var(--radius-md); cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--text-dim); font-weight: 700; font-size: 14px; }
        .nav-item:hover { background: rgba(0,0,0,0.03); color: var(--accent); transform: translateX(5px); }
        .nav-item.active { background: var(--gradient); color: white; box-shadow: 0 10px 20px var(--accent-glow); }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; scroll-behavior: smooth; }
        .page { display: none; opacity: 0; transform: translateY(15px); }
        .page.active { display: block; animation: fadeIn 0.5s forwards; }

        .card { background: var(--card); border-radius: var(--radius-lg); padding: 25px; border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 25px; }
        
        #timer-display { font-family: 'Fredoka', sans-serif; font-size: 80px; font-weight: 600; color: var(--accent); text-align: center; margin: 15px 0; letter-spacing: -2px; }
        .btn { padding: 12px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; }
        .btn-main { background: var(--gradient); color: white; box-shadow: 0 5px 15px var(--accent-glow); }
        .btn-sub { background: var(--btn-sub-bg); color: var(--btn-sub-text); border: 1px solid var(--border); }

        .ptn-badge { width: 65px; height: 65px; border-radius: 15px; background: #fff; border: 3px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 8px; filter: grayscale(1); opacity: 0.6; }
        .ptn-badge.active { border-color: var(--accent); filter: grayscale(0); opacity: 1; box-shadow: 0 0 15px var(--accent-glow); }

        .palette-box { position: fixed; bottom: 100px; right: 30px; background: var(--card); padding: 15px; border-radius: 20px; display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; border: 2px solid var(--accent); z-index: 1001; }
        .color-dot { width: 35px; height: 35px; border-radius: 10px; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); }
        .floating-ui { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        select.status-dropdown { background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body data-theme="light" class="color-lavender">

    <aside class="sidebar">
        <div style="margin-bottom: 20px; text-align: center;">
            <h2 id="display-name" contenteditable="true" onblur="saveAll()" style="font-family:'Fredoka'; font-size: 26px;">Name</h2>
            <p style="font-size: 11px; color: var(--accent); font-weight: 800; letter-spacing: 1px;">TARGET PTN 2026</p>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
                <div class="ptn-badge" id="badge-ui" onclick="setPTN('UI')"><img src="https://1.bp.blogspot.com/-SE6r3dDLmew/Xkiv0MuNmmI/AAAAAAAABn8/WmKa1sn4VLEDyTaL5z097PMynMPRrHPVwCLcBGAsYHQ/s1600/Logo%2BUI%2B%2528Universitas%2BIndonesia%2529.png" width="40" alt="UI"></div>
                <div class="ptn-badge" id="badge-itb" onclick="setPTN('ITB')"><img src="https://3.bp.blogspot.com/-s95tgL3uf0E/WgKTHRoQZpI/AAAAAAAAEmA/J0ApeaSrpZ4oSsC6SQtyZ50yG5RmhKjDwCLcBGAs/s1600/itb.png" width="40" alt="ITB"></div>
                <div class="ptn-badge" id="badge-ugm" onclick="setPTN('UGM')"><img src="https://4.bp.blogspot.com/-dGATfRRR6u4/U_oF81v7WJI/AAAAAAAAAHo/ooiKciqRLMY/s1600/LOGO-UGM-BAKU-tnp-back-grou.png" width="40" alt="UGM"></div>
            </div>
        </div>

        <nav>
            <div class="nav-item active" onclick="switchPage('home', this)"><i data-lucide="layout"></i> Dashboard</div>
            <div class="nav-item" onclick="switchPage('arena', this)"><i data-lucide="bar-chart-3"></i> TryOut Tracker</div>
            <div class="nav-item" onclick="switchPage('life', this)"><i data-lucide="book-open"></i> Habit Tracker</div>
            <div class="nav-item" onclick="switchPage('misi', this)"><i data-lucide="target"></i> To do List</div>
        </nav>

        <div style="margin-top: auto;">
            <div id="countdown" style="font-size: 11px; margin-bottom: 15px; font-weight: 800; text-align: center; color: var(--accent);">00D 00:00:00</div>
            <button class="btn btn-main" style="width:100%" onclick="saveAll(true)">💾 SYNC DATA</button>
        </div>
    </aside>

    <main class="main-content">
        <div id="page-home" class="page active">
            <h1 style="font-size: 36px; font-weight: 800;">Semangatt, <span id="welcome-name" style="color:var(--accent)">Name</span>! 🚀</h1>
            <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px; margin-top: 30px;">
                <div class="card">
                    <p style="text-align: center; font-size: 10px; font-weight: 800; opacity: 0.5; letter-spacing: 2px;">POMODORO / FOCUS</p>
                    <div id="timer-display">00:00:00</div>
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
                        <button class="btn btn-main" onclick="startTimer()">Start</button>
                        <button class="btn btn-sub" onclick="pauseTimer()">Pause</button>
                        <button class="btn btn-sub" onclick="resetTimer()">Reset</button>
                        <button class="btn btn-sub" onclick="stopAndLog()" style="color:var(--accent)">Log</button>
                    </div>
                </div>
                <div class="card">
                    <h4 style="margin-bottom: 15px;">Recent Study 📝</h4>
                    <div id="log-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
                </div>
            </div>
        </div>

        <div id="page-arena" class="page">
            <h1>TryOut Tracker ⚔️</h1>
            <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; margin-top: 25px;">
                <div class="card"><h5>Score Stats</h5><canvas id="scoreChart"></canvas></div>
                <div class="card">
                    <table style="width:100%; border-collapse: collapse;">
                        <tbody id="to-body"></tbody>
                    </table>
                    <button class="btn btn-sub" style="width:100%; margin-top:15px;" onclick="addTORow()">+ Add Try Out Result</button>
                </div>
            </div>
        </div>

        <div id="page-life" class="page">
            <h1>Habit Tracker 📔</h1>
            <div class="card" style="margin-top: 25px;">
                <input type="date" id="habit-date" style="padding:10px; border-radius:10px; border:1px solid var(--border); margin-bottom:20px;" onchange="loadHabit()">
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;">
                    <input type="time" id="h-wake" placeholder="Wake Up" style="padding:15px; border-radius:12px; border:1px solid var(--border);">
                    <input type="time" id="h-sleep" placeholder="Sleep" style="padding:15px; border-radius:12px; border:1px solid var(--border);">
                    <input type="text" id="h-read" placeholder="📚 Membaca apa hari ini?" style="padding:15px; border-radius:12px; border:1px solid var(--border); grid-column: span 1;">
                    <input type="text" id="h-watch" placeholder="🎬 Menonton apa hari ini?" style="padding:15px; border-radius:12px; border:1px solid var(--border); grid-column: span 1;">
                    <input type="text" id="h-hang" placeholder="🍕 Hang out / Istirahat kemana?" style="padding:15px; border-radius:12px; border:1px solid var(--border); grid-column: span 2;">
                </div>
            </div>
        </div>

        <div id="page-misi" class="page">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <div>
                    <h1>To do List 🎯</h1>
                    <p id="week-indicator" style="font-size: 13px; font-weight: 800; color: var(--accent); margin-top: 5px;"></p>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-sub" onclick="changeWeek(-1)">◀ Prev</button>
                    <button class="btn btn-sub" onclick="changeWeek(1)">Next ▶</button>
                </div>
            </div>

            <div id="weekly-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; align-items: start; margin-bottom: 50px;">
                </div>

            <div class="card" style="border-top: 5px solid var(--accent);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="font-family: 'Fredoka';">Master To-Do List 📋</h2>
                    <button class="btn btn-main" onclick="addMasterTodo()">+ Tambah Tugas</button>
                </div>
                <div id="master-todo-list" style="display: flex; flex-direction: column; gap: 10px;">
                    </div>
            </div>
        </div>
    </main>

    <div class="palette-box" id="palette">
        <div class="color-dot" style="background:#b19cd9" onclick="setTheme('lavender')"></div>
        <div class="color-dot" style="background:#82d1e0" onclick="setTheme('mint')"></div>
        <div class="color-dot" style="background:#ff9aa2" onclick="setTheme('rose')"></div>
        <div class="color-dot" style="background:#74b9ff" onclick="setTheme('sky')"></div>
        <div class="color-dot" style="background:#ffdac1" onclick="setTheme('peach')"></div>
        <div class="color-dot" style="background:#b5ebb4" onclick="setTheme('sage')"></div>
        <div class="color-dot" style="background:#fee135" onclick="setTheme('lemon')"></div>
        <div class="color-dot" style="background:#ffb7b2" onclick="setTheme('apricot')"></div>
        <div class="color-dot" style="background:#e0bbe4" onclick="setTheme('grape')"></div>
    </div>

    <div class="floating-ui">
        <button class="btn btn-sub" style="width:50px; height:50px;" onclick="togglePalette()">🎨</button>
        <button class="btn btn-sub" style="width:50px; height:50px;" onclick="toggleStyle()">👾</button>
        <button class="btn btn-sub" style="width:50px; height:50px;" onclick="toggleDark()">🌓</button>
    </div>

    <script>
        lucide.createIcons();
        const days = ["Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu", "Minggu"];
        let weekOffset = 0;
        let timerInt, sec = 0, isRunning = false, scoreChart;

        let db = JSON.parse(localStorage.getItem('snbt_master_v11')) || {
            profile: { name: "Name", theme: "light", color: "lavender", style: "modern", ptn: "UI" },
            toData: [], habits: {}, missions: {}, masterTodo: [], logs: []
        };

        window.onload = () => {
            initChart(); renderAll(); startCountdown();
            document.getElementById('habit-date').value = new Date().toISOString().split('T')[0];
            loadHabit();
        };

        function saveAll(manual = false) {
            db.profile.name = document.getElementById('display-name').innerText;
            const dk = document.getElementById('habit-date').value;
            db.habits[dk] = {
                wake: document.getElementById('h-wake').value, sleep: document.getElementById('h-sleep').value,
                read: document.getElementById('h-read').value, watch: document.getElementById('h-watch').value,
                hang: document.getElementById('h-hang').value
            };
            localStorage.setItem('snbt_master_v11', JSON.stringify(db));
            document.getElementById('welcome-name').innerText = db.profile.name;
            if(manual) alert("Data Tersinkronisasi! ✨");
            updateChart();
        }

        // --- WEEKLY LOGIC ---
        function getMonday(offset) {
            let d = new Date();
            let day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6 : 1) + (offset * 7);
            return new Date(d.setDate(diff));
        }

        function changeWeek(dir) {
            weekOffset += dir;
            renderWeeklyMissions();
        }

        function renderWeeklyMissions() {
            const container = document.getElementById('weekly-container');
            const monday = getMonday(weekOffset);
            const weekKey = monday.toISOString().split('T')[0];
            
            document.getElementById('week-indicator').innerText = `Minggu: ${monday.toLocaleDateString('id-ID', {day:'numeric', month:'short'})} - ${new Date(new Date(monday).setDate(monday.getDate()+6)).toLocaleDateString('id-ID', {day:'numeric', month:'short'})}`;
            
            if (!db.missions[weekKey]) db.missions[weekKey] = { Senin:[], Selasa:[], Rabu:[], Kamis:[], Jumat:[], Sabtu:[], Minggu:[] };
            container.innerHTML = "";

            days.forEach((day, idx) => {
                let dStr = new Date(new Date(monday).setDate(monday.getDate()+idx)).toLocaleDateString('id-ID', {day:'2-digit', month:'short'});
                const card = document.createElement('div');
                card.className = 'card'; card.style = "margin-bottom:0; border-top: 4px solid var(--accent);";
                
                let listHtml = db.missions[weekKey][day].map((m, i) => `
                    <div style="display:flex; gap:8px; align-items:center; background:var(--bg); padding:10px; border-radius:12px; margin-bottom:8px;">
                        <input type="checkbox" ${m.status=='Selesai'?'checked':''} onchange="toggleMisi('${weekKey}','${day}',${i})" style="accent-color:var(--accent)">
                        <input type="text" value="${m.text}" onchange="db.missions['${weekKey}']['${day}'][${i}].text=this.value; saveAll()" style="flex:1; border:none; background:transparent; font-size:12px; font-weight:700; ${m.status=='Selesai'?'text-decoration:line-through;opacity:0.5':''}">
                        <button onclick="db.missions['${weekKey}']['${day}'].splice(${i},1); renderWeeklyMissions(); saveAll()" style="border:none; background:transparent; color:red; cursor:pointer">✕</button>
                    </div>
                `).join('');

                card.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:10px;">
                    <div><h4 style="font-family:'Fredoka'; color:var(--accent)">${day}</h4><small style="font-size:10px; opacity:0.6">${dStr}</small></div>
                    <button onclick="db.missions['${weekKey}']['${day}'].push({text:'', status:'Belum'}); renderWeeklyMissions()" style="background:var(--gradient); color:white; border:none; border-radius:8px; width:25px; height:25px; cursor:pointer">+</button>
                </div>${listHtml}`;
                container.appendChild(card);
            });
            renderMasterTodo();
        }

        function toggleMisi(wk, dy, i) {
            db.missions[wk][dy][i].status = db.missions[wk][dy][i].status == 'Selesai' ? 'Belum' : 'Selesai';
            renderWeeklyMissions(); saveAll();
        }

        // --- MASTER TODO ---
        function addMasterTodo() { db.masterTodo.push({text:"", status:"Belum Selesai"}); renderMasterTodo(); saveAll(); }
        function renderMasterTodo() {
            const list = document.getElementById('master-todo-list');
            list.innerHTML = db.masterTodo.map((t, i) => `
                <div style="display:flex; gap:12px; align-items:center; background:var(--sidebar); padding:15px; border-radius:18px; border:1px solid var(--border);">
                    <input type="text" value="${t.text}" onchange="db.masterTodo[${i}].text=this.value; saveAll()" placeholder="Tulis target besarmu..." style="flex:1; border:none; background:transparent; font-weight:700; color:inherit;">
                    <select class="status-dropdown" onchange="db.masterTodo[${i}].status=this.value; saveAll(); renderMasterTodo()">
                        <option ${t.status=='Belum Selesai'?'selected':''}>Belum Selesai</option>
                        <option ${t.status=='Selesai'?'selected':''}>Selesai</option>
                        <option ${t.status=='Belum Evaluasi'?'selected':''}>Belum Evaluasi</option>
                    </select>
                    <button onclick="db.masterTodo.splice(${i},1); renderMasterTodo(); saveAll()" style="background:none; border:none; color:red; cursor:pointer;">✕</button>
                </div>
            `).join('');
        }

        // --- CORE UI ---
        function renderAll() {
            document.body.dataset.theme = db.profile.theme;
            document.body.className = 'color-' + db.profile.color;
            document.body.dataset.style = db.profile.style;
            document.getElementById('display-name').innerText = db.profile.name;
            setPTN(db.profile.ptn); renderTO(); renderLogs(); renderWeeklyMissions();
        }
        function switchPage(p, el) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(ni => ni.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active'); el.classList.add('active');
        }
        function setPTN(u) { db.profile.ptn = u; document.querySelectorAll('.ptn-badge').forEach(b => b.classList.remove('active')); document.getElementById('badge-'+u.toLowerCase())?.classList.add('active'); saveAll(); }
        function togglePalette() { const p = document.getElementById('palette'); p.style.display = p.style.display == 'grid' ? 'none' : 'grid'; }
        function setTheme(c) { db.profile.color = c; renderAll(); saveAll(); togglePalette(); }
        function toggleDark() { db.profile.theme = db.profile.theme == 'dark' ? 'light' : 'dark'; renderAll(); saveAll(); }
        function toggleStyle() { db.profile.style = db.profile.style == 'pixel' ? 'modern' : 'pixel'; renderAll(); saveAll(); }

        // --- TIMER & ARENA ---
        function startTimer() { if(!isRunning){ isRunning=true; timerInt=setInterval(()=>{sec++; updateTimerUI()},1000);}}
        function pauseTimer() { isRunning=false; clearInterval(timerInt); }
        function resetTimer() { pauseTimer(); sec=0; updateTimerUI(); }
        function updateTimerUI() {
            const h=Math.floor(sec/3600).toString().padStart(2,'0'), m=Math.floor((sec%3600)/60).toString().padStart(2,'0'), s=(sec%60).toString().padStart(2,'0');
            document.getElementById('timer-display').innerText = `${h}:${m}:${s}`;
        }
        function stopAndLog() {
            if(sec<1)return;
            db.logs.push({date: new Date().toLocaleDateString('id-ID'), duration: document.getElementById('timer-display').innerText, raw:sec});
            resetTimer(); saveAll(); renderLogs();
        }
        function renderLogs() {
            document.getElementById('log-list').innerHTML = db.logs.slice(-5).reverse().map(l=>`<div style="display:flex;justify-content:space-between;padding:10px;background:var(--bg);border-radius:10px;font-size:11px;border:1px solid var(--border);"><span>📅 ${l.date}</span><b>${l.duration}</b></div>`).join('');
        }
        function renderTO() {
            const b = document.getElementById('to-body'); b.innerHTML = "";
            db.toData.forEach((t, i) => {
                b.innerHTML += `<tr style="border-bottom:1px solid var(--border)"><td style="padding:10px"><input type="text" value="${t.name}" onchange="db.toData[${i}].name=this.value;saveAll()" style="border:none;background:transparent;font-weight:700;width:100%"></td><td style="padding:10px"><input type="number" value="${t.score}" onchange="db.toData[${i}].score=this.value;saveAll()" style="border:none;background:transparent;color:var(--accent);width:50px;font-weight:800"></td><td onclick="db.toData.splice(${i},1);renderTO();saveAll()" style="color:red;cursor:pointer">✕</td></tr>`;
            });
        }
        function addTORow() { db.toData.push({name:"Try Out #", date:new Date().toISOString().split('T')[0], score:0}); renderTO(); saveAll(); }
        function initChart() { scoreChart = new Chart(document.getElementById('scoreChart'), { type:'line', data:{labels:[], datasets:[{data:[], borderColor:'#b19cd9', tension:0.4, fill:true, backgroundColor:'rgba(177,156,217,0.1)'}]}, options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}}); }
        function updateChart() { if(scoreChart){ scoreChart.data.labels=db.toData.map(d=>d.name); scoreChart.data.datasets[0].data=db.toData.map(d=>d.score); scoreChart.update();}}
        function loadHabit() {
            const dk = document.getElementById('habit-date').value; 
            const h = db.habits[dk] || {wake:"", sleep:"", read:"", watch:"", hang:""};
            document.getElementById('h-wake').value=h.wake; document.getElementById('h-sleep').value=h.sleep;
            document.getElementById('h-read').value=h.read; document.getElementById('h-watch').value=h.watch; document.getElementById('h-hang').value=h.hang;
        }
        function startCountdown() { 
            const target = new Date('April 21, 2026').getTime(); 
            setInterval(() => { 
                const diff = target - new Date().getTime(); 
                const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000); 
                document.getElementById('countdown').innerText = `${d}D ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; 
            }, 1000); 
        }
    </script>
</body>
